# =============================================================================
# DOCKER COMPOSE - Configuration Production
# =============================================================================
# Usage avec profiles:
#   make up-prod       (services essentiels uniquement - AUCUN profile activé)
#
# Usage manuel:
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# IMPORTANT: En production, AUCUN profile ne doit être activé.
# Les services dev (node, mailhog, adminer) et tools (dozzle, it-tools,
# watchtower) ne démarreront pas car ils nécessitent leurs profiles.
# =============================================================================

services:
  apache:
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  php:
    restart: always
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - PHP_OPCACHE_VALIDATE_TIMESTAMPS=0
      - PHP_OPCACHE_PRELOAD=/var/www/html/config/opcache-preload.php
      - PHP_OPCACHE_PRELOAD_USER=www-data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

  mariadb:
    restart: always
    environment:
      - MARIADB_AUTO_UPGRADE=1
      - MARIADB_DISABLE_UPGRADE_BACKUP=1
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  redis:
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M