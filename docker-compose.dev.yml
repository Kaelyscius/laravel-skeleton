# =============================================================================
# DOCKER COMPOSE - Configuration Développement
# =============================================================================
# Usage avec profiles:
#   make up-dev        (services essentiels + dev tools)
#   make up-dev-full   (services essentiels + dev + tools)
#
# Usage manuel:
#   docker-compose --profile dev --profile tools up -d
# =============================================================================

services:
  php:
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - XDEBUG_ENABLE=true
      - PHP_OPCACHE_VALIDATE_TIMESTAMPS=1
      - PHP_OPCACHE_REVALIDATE_FREQ=0
    volumes:
      - ./docker/php/conf/xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  apache:
    environment:
      - APACHE_LOG_LEVEL=debug
    volumes:
      - ./docker/apache/logs:/usr/local/apache2/logs

  node:
    # Ne pas démarrer npm run dev automatiquement (utiliser make npm-dev)
    # command: npm run dev
    stdin_open: true
    tty: true
    environment:
      - CHOKIDAR_USEPOLLING=true
      - NODE_ENV=development

  # Outils additionnels de développement (profile "dev-extra")
  # PHPMyAdmin comme alternative à Adminer
  phpmyadmin:
    profiles: ["dev-extra"]
    image: phpmyadmin:latest
    container_name: ${COMPOSE_PROJECT_NAME}_phpmyadmin
    ports:
      - "8083:80"
    environment:
      - PMA_HOST=mariadb
      - PMA_USER=root
      - PMA_PASSWORD=${DB_ROOT_PASSWORD}
      - UPLOAD_LIMIT=64M
    networks:
      - app-network
    depends_on:
      - mariadb
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Redis Commander pour visualiser Redis
  redis-commander:
    profiles: ["dev-extra"]
    image: rediscommander/redis-commander:latest
    container_name: ${COMPOSE_PROJECT_NAME}_redis_commander
    ports:
      - "8082:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379:0:${REDIS_PASSWORD}
    networks:
      - app-network
    depends_on:
      - redis
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"